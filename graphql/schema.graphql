"A datetime string with format `Y-m-d H:i:s`, e.g. `2018-05-23 13:43:32`."
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

"Arbitrary JSON data (used for dynamic field values)."
scalar JSON @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\JSON")

type Query {
    user(
        id: ID @eq @rules(apply: ["prohibits:email", "required_without:email"])
        email: String @eq @rules(apply: ["prohibits:id", "required_without:id", "email"])
    ): User @find

    users(name: String @where(operator: "like")): [User!]! @paginate(defaultCount: 10)

    posts(status: String @eq): [Post!]! @paginate(defaultCount: 10)
    post(slug: String @eq): Post @find

    pages(status: String @eq): [Page!]! @paginate(defaultCount: 10)
    page(slug: String @eq): Page @find

    products(status: String @eq): [Product!]! @paginate(defaultCount: 10)
    product(slug: String @eq): Product @find

    fieldGroups(content_type: String @eq): [FieldGroup!]! @all
    fieldGroup(slug: String @eq): FieldGroup @find
}

type User {
    id: ID!
    name: String!
    email: String!
    email_verified_at: DateTime
    created_at: DateTime!
    updated_at: DateTime!
}

type Post {
    id: ID!
    title: JSON!
    content: JSON!
    slug: String!
    status: String!
    published_at: DateTime
    created_at: DateTime!
    updated_at: DateTime!
    sections: [ContentSection!]! @hasMany(relation: "contentSections")
}

type Page {
    id: ID!
    title: JSON!
    content: JSON!
    slug: String!
    status: String!
    created_at: DateTime!
    updated_at: DateTime!
    sections: [ContentSection!]! @hasMany(relation: "contentSections")
}

type Product {
    id: ID!
    name: JSON!
    description: JSON!
    price: Float!
    stock: Int!
    slug: String!
    status: String!
    created_at: DateTime!
    updated_at: DateTime!
    sections: [ContentSection!]! @hasMany(relation: "contentSections")
}

type ContentSection {
    id: ID!
    order: Int!
    fieldGroup: FieldGroup! @belongsTo
    "Datos estructurados de la sección como objeto JSON"
    data: JSON! @method(name: "toStructuredData")
}

type FieldGroup {
    id: ID!
    title: String!
    slug: String!
    description: String
    content_type: String!
    is_active: Boolean!
    order: Int!
    fields: [FieldDefinition!]! @hasMany(relation: "fieldDefinitions")
}

type FieldDefinition {
    id: ID!
    label: String!
    name: String!
    type: String!
    required: Boolean!
    options: JSON
    settings: JSON
    instructions: String
    order: Int!
    sub_fields: [FieldDefinition!]! @hasMany(relation: "subFields")
}